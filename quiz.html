<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    


    <header>
      <h1>PokeScope</h1>
    </header>
   <nav>
      <a href="index.html">HomePage</a>
      <a href="map.html">Poke Map</a>
      <a href="quiz.html">Quiz</a>
    </nav>

      <div class="quiz-container">
        
        <h1>Which is your Favourite Generation?</h1>
        <div class="button-grid">
            <button class="genButton">Gen 1</button>
            <button class="genButton">Gen 2</button>
            <button class="genButton">Gen 3</button>
            <button class="genButton">Gen 4</button>
            <button class="genButton">Gen 5</button>
            <button class="genButton">Gen 6</button>
            <button class="genButton">Gen 7</button>
            <button class="genButton">Gen 8</button>
        </div>

          <div class="image-container">
            <img 
              src="images/all.starters.png" 
              alt="Starters"
              class="starter-image"
              data-info="These are starter Pokémon from different generations!" 
            />
          </div>
         <div id="result" class="result-box"></div>
      </div>
  
      <script>
      const buttons = document.querySelectorAll(".genButton");
      const resultBox = document.getElementById("result");

      buttons.forEach((button, index) => {
        button.addEventListener("click", () => {
          const gen = index + 1;

          // save choice 
          localStorage.setItem("selectedGen", gen);

          // show result
          resultBox.style.display = "block";
          resultBox.innerHTML = `
            <h2>You chose Generation ${gen}!</h2>
          `;
        });
      });
      </script>
</body>
</html>
