<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pokémon Multi-Line Editable Chart</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <link rel="stylesheet" href="../visualizations.css" />
</head>

<body>

  <h1>Pokémon Generations (Editable Lines)</h1>

<div class="buttons">
  <button class="btn" onclick="showAll()">Show All</button>
  <button class="btn" onclick="hideAll()">Hide All</button>

  <button class="btn" onclick="toggleSeries('base')">Base</button>
  <button class="btn" onclick="toggleSeries('mega')">Megas</button>
  <button class="btn" onclick="toggleSeries('gmax')">GMax</button>
  <button class="btn" onclick="toggleSeries('alola')">Alola</button>
</div>

  <div id="vis"></div>

  <script src="../vis_total.js"></script>

</body>
</html>
