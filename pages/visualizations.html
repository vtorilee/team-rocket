<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visualizations</title>
</head>

<body>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <div id="vis"></div>

  <script>
    async function loadDataWithImages() {
      const csvUrl = "../datasets/Favourite_Pokemon_Survey.csv";
      const csvText = await fetch(csvUrl).then(r => r.text());

      const rows = csvText.trim().split("\n").slice(1);
      const data = rows.map(row => {
        const [Generation, type, starter, dex, votes] = row.split(",");
        return { Generation, type, starter, dex, votes: +votes };
      });

      const starters = [...new Set(data.map(d => d.starter))];
      const starterImages = {};

      for (const starter of starters) {
        const apiName = starter.toLowerCase();
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${apiName}`);
        const json = await res.json();
        starterImages[starter] = json.sprites.other["official-artwork"].front_default;
      }

      data.forEach((d, i) => {
          d.img = starterImages[d.starter];

          const orderMap = {
            "Bulbasaur": 1, "Charmander": 2, "Squirtle": 3,
            "Chikorita": 5, "Cyndaquil": 6, "Totodile": 7,
            "Treecko": 9, "Torchic": 10, "Mudkip": 11,
            "Turtwig": 13, "Chimchar": 14, "Piplup": 15,
            "Snivy": 17, "Tepig": 18, "Oshawott": 19,
            "Chespin": 21, "Fennekin": 22, "Froakie": 23,
            "Rowlet": 25, "Litten": 26, "Popplio": 27,
            "Grookey": 29, "Scorbunny": 30, "Sobble": 31,
            "Sprigatito": 33, "Fuecoco": 34, "Quaxly": 35
          };

          d.order = orderMap[d.starter];
        });

      return data;
    }

    loadDataWithImages().then(data => {
      console.log("Loaded data:", data);
      const spec = {
        $schema: "https://vega.github.io/schema/vega-lite/v5.json",

        data: { values: data },

        encoding: {
          "x": {
              "field": "Generation",
              "type": "ordinal",
              "sort": [
                "Gen I (Kanto)", "Gen II (Johto)", "Gen III (Hoenn)",
                "Gen IV (Sinnoh)", "Gen V (Unova)", "Gen VI (Kalos)",
                "Gen VII (Alola)", "Gen VIII (Galar/Hisui)", "Gen IX (Paldea)"
              ],
              "axis": { "labelAngle": 0 }
            },

          
          "xOffset": {
            "field": "type"
          },

          y: {
            field: "votes",
            type: "quantitative",
            title: "Number of Votes"
          }
        },

        layer: [
          {
            mark: {
              type: "bar",
              size: 25,
              cornerRadiusTopLeft: 5,
              cornerRadiusTopRight: 5
            },
            encoding: {
              color: {
                field: "type",
                type: "nominal",
                scale: {
                  domain: ["Grass", "Fire", "Water"],
                  range: ["#78C850", "#F08030", "#6890F0"]
                }
              },
              tooltip: [
                { field: "starter", title: "Starter" },
                { field: "votes", title: "Votes" },
                { field: "type", title: "Type" }
              ]
            }
          },

          {
            mark: {
              type: "image",
              width: 40,
              height: 40,
              yOffset: -20
            },
            encoding: {
              url: { field: "img" }
            }
          }
        ],

        width: 900,
    
        height: 600,
        spacing: 10
        
      };

      vegaEmbed("#vis", spec);
    });
  </script>

</body>
</html>
