<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Favourite Types Jitter Plot</title>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

<div id="vis"></div>

<script>
const spec = {
  $schema: "https://vega.github.io/schema/vega-lite/v5.json",

  data: {
    url: "../datasets/favourite_types.csv",
    format: { type: "csv" }
  },

  transform: [
    { calculate: "random()", as: "jitter" },
    
    {
      lookup: "Type",
      from: {
        data: {
          values: [
            { Type: "Water", img: "../images/types/water.png" },
            { Type: "Fire", img: "../images/types/fire.png" },
            { Type: "Grass", img: "../images/types/grass.png" },
            { Type: "Ghost", img: "../images/types/ghost.png" },
            { Type: "Flying", img: "../images/types/flying.png" },
            { Type: "Psychic", img: "../images/types/psychic.png" },
            { Type: "Normal", img: "../images/types/normal.png" },
            { Type: "Dragon", img: "../images/types/dragon.png" },
            { Type: "Fairy", img: "../images/types/fairy.png" },
            { Type: "Dark", img: "../images/types/dark.png" },
            { Type: "Ground", img: "../images/types/ground.png" },
            { Type: "Electric", img: "../images/types/electric.png" },
            { Type: "Steel", img: "../images/types/steel.png" },
            { Type: "Poison", img: "../images/types/poison.png" },
            { Type: "Fighting", img: "../images/types/fighting.png" },
            { Type: "Bug", img: "../images/types/bug.png" },
            { Type: "Ice", img: "../images/types/ice.png" },
            { Type: "Rock", img: "../images/types/rock.png" }
          ]
        },
        key: "Type",
        fields: ["img"]
      }
    }
  ],

  mark: {
    type: "image",
    width: 38,
    height: 38
  },

  encoding: {
    x: {
      field: "jitter",
      type: "quantitative",
      axis: null
    },

    y: {
      field: "Percentage",
      type: "quantitative",
      title: "Popularity (%)"
    },

    url: {
      field: "img"
    },

    tooltip: [
      { field: "Type" },
      { field: "Votes" },
      { field: "Percentage" }
    ]
  },

  width: 600,
  height: 500
};

vegaEmbed("#vis", spec);
</script>
